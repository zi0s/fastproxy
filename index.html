<!DOCTYPE html>
<html>
<head>
  <title>Privacy Proxy</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ccc;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Privacy Proxy</h1>

<input id="url" placeholder="https://example.com">
<button onclick="openProxy()">Open</button>

<iframe id="frame"></iframe>

<script>
function openProxy() {
  const url = document.getElementById("url").value;

  const worker =
    "proxy.hadi-zamelzzz.workers.dev";

  document.getElementById("frame").src =
    worker + encodeURIComponent(url);
}
</script>

</body>
</html>
